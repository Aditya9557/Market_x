name: student_hero_app
description: Student Hero Campus Delivery App
version: 1.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Navigation
  go_router: ^13.0.0
  
  # HTTP & API
  dio: ^5.4.0
  
  # Auth & Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  
  # Maps & Location
  mapbox_maps_flutter: ^2.0.0
  geolocator: ^11.0.0
  
  # Background Location (Battery-efficient)
  flutter_background_geolocation: ^4.14.0
  
  # Real-time
  supabase_flutter: ^2.3.0
  socket_io_client: ^2.0.0
  
  # Payments
  flutter_stripe: ^10.1.0
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_animate: ^4.3.0
  
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.0
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
